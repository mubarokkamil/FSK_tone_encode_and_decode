<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DSP Chat</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:         #0e1117;
  --surface:    #161b22;
  --surface2:   #1c2330;
  --border:     #21262d;
  --bubble-out: #2ea84f;
  --bubble-in:  #1c2330;
  --text:       #e6edf3;
  --text-muted: #7d8590;
  --text-dim:   #484f58;
  --accent:     #2ea84f;
  --accent-dim: rgba(46,168,79,0.15);
  --sending:    #f0883e;
  --radius-msg: 18px;
  --font:       'DM Sans', sans-serif;
  --mono:       'DM Mono', monospace;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  font-size: 15px;
  -webkit-font-smoothing: antialiased;
}

.app {
  display: flex;
  flex-direction: column;
  height: 100vh;
  max-width: 480px;
  margin: 0 auto;
  background: var(--bg);
  border-left: 1px solid var(--border);
  border-right: 1px solid var(--border);
}

/* Header */
.header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 18px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.avatar {
  width: 40px; height: 40px;
  border-radius: 50%;
  background: linear-gradient(135deg, #2ea84f, #1a6b35);
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; font-weight: 600; color: #fff;
  flex-shrink: 0; position: relative;
}

.avatar::after {
  content: '';
  position: absolute; bottom: 1px; right: 1px;
  width: 10px; height: 10px;
  background: #2ea84f;
  border-radius: 50%;
  border: 2px solid var(--surface);
}

.header-info { flex: 1; min-width: 0; }

.header-name {
  font-weight: 600; font-size: 15px; color: var(--text);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

.header-sub {
  font-size: 12px; color: var(--text-muted);
  margin-top: 1px; display: flex; align-items: center; gap: 5px;
}

.freq-badge {
  font-family: var(--mono); font-size: 10px;
  background: var(--accent-dim); color: var(--accent);
  border: 1px solid rgba(46,168,79,0.25);
  padding: 1px 6px; border-radius: 3px; letter-spacing: 0.02em;
}

.icon-btn {
  width: 36px; height: 36px; border-radius: 50%;
  background: none; border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--text-muted); transition: background 0.15s, color 0.15s;
}
.icon-btn:hover { background: var(--surface2); color: var(--text); }
.icon-btn svg { width: 18px; height: 18px; fill: currentColor; }

/* Waveform strip */
.wave-strip {
  height: 38px; background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 0 16px; gap: 10px; flex-shrink: 0;
}

.wave-label {
  font-family: var(--mono); font-size: 9px;
  color: var(--text-dim); letter-spacing: 0.15em;
  text-transform: uppercase; white-space: nowrap; flex-shrink: 0;
}

#wave-canvas {
  flex: 1; height: 26px; display: block;
}

/* Chat body */
.chat-body {
  flex: 1; overflow-y: auto;
  padding: 16px 14px;
  display: flex; flex-direction: column; gap: 3px;
  scroll-behavior: smooth;
}

.chat-body::-webkit-scrollbar { width: 3px; }
.chat-body::-webkit-scrollbar-track { background: transparent; }
.chat-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.date-divider { text-align: center; margin: 8px 0 6px; }
.date-divider span {
  font-size: 11.5px; color: var(--text-muted);
  background: var(--surface2); padding: 3px 12px; border-radius: 10px;
}

.msg-row {
  display: flex; flex-direction: column;
  animation: popIn 0.2s cubic-bezier(0.34,1.56,0.64,1) both;
}

@keyframes popIn {
  from { opacity: 0; transform: scale(0.88) translateY(6px); }
  to   { opacity: 1; transform: scale(1) translateY(0); }
}

.msg-row.out { align-items: flex-end; }
.msg-row.in  { align-items: flex-start; }

.bubble {
  max-width: 78%; padding: 9px 13px;
  border-radius: var(--radius-msg);
  word-break: break-word; line-height: 1.45; font-size: 14.5px;
}

.msg-row.out .bubble {
  background: var(--bubble-out); color: #fff;
  border-bottom-right-radius: 4px;
}

.msg-row.out.sending .bubble {
  background: var(--surface2);
  border: 1px solid var(--sending);
  color: var(--text-muted);
}

.msg-row.in .bubble {
  background: var(--bubble-in); color: var(--text);
  border-bottom-left-radius: 4px;
  border: 1px solid var(--border);
}

.msg-meta {
  display: flex; align-items: center; gap: 3px;
  font-size: 11px; color: rgba(255,255,255,0.5);
  margin-top: 3px; justify-content: flex-end;
}

.msg-row.out.sending .msg-meta { color: var(--sending); }

.tick svg { width: 15px; height: 15px; }

/* Binary hint */
.binary-hint {
  font-family: var(--mono); font-size: 9.5px;
  color: var(--text-dim); margin-top: 3px;
  letter-spacing: 0.04em; max-width: 78%;
  word-break: break-all; text-align: right;
  opacity: 0; transition: opacity 0.4s;
}
.binary-hint.visible { opacity: 1; }

/* Sending indicator */
.sending-indicator {
  display: flex; align-items: center; gap: 9px;
  padding: 8px 14px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-msg);
  border-bottom-right-radius: 4px;
  max-width: 78%; align-self: flex-end;
}

.tone-bars { display: flex; gap: 2px; align-items: flex-end; height: 16px; }

.tone-bar {
  width: 3px; border-radius: 2px; background: var(--sending);
  animation: barAnim 0.6s ease-in-out infinite;
}
.tone-bar:nth-child(1) { animation-delay: 0s;   height: 6px; }
.tone-bar:nth-child(2) { animation-delay: 0.1s; height: 11px; }
.tone-bar:nth-child(3) { animation-delay: 0.2s; height: 16px; }
.tone-bar:nth-child(4) { animation-delay: 0.3s; height: 11px; }
.tone-bar:nth-child(5) { animation-delay: 0.4s; height: 6px; }

@keyframes barAnim {
  0%,100% { opacity: 0.3; transform: scaleY(0.5); }
  50%      { opacity: 1;   transform: scaleY(1); }
}

.sending-text { font-size: 12px; color: var(--sending); font-family: var(--mono); }
.bit-counter  { font-size: 10px; color: var(--text-dim); font-family: var(--mono); }

/* System msg */
.sys-msg {
  text-align: center; font-size: 11px;
  color: var(--text-dim); padding: 3px 0;
  font-family: var(--mono); letter-spacing: 0.04em;
}

/* Input bar */
.input-bar {
  display: flex; align-items: flex-end; gap: 8px;
  padding: 10px 12px 12px;
  background: var(--surface);
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}

.input-wrap {
  flex: 1; background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 22px;
  display: flex; align-items: flex-end;
  padding: 8px 14px; gap: 8px;
  transition: border-color 0.2s;
}
.input-wrap:focus-within { border-color: rgba(46,168,79,0.45); }

#msg-input {
  flex: 1; background: none; border: none; outline: none;
  color: var(--text); font-family: var(--font);
  font-size: 14.5px; line-height: 1.4;
  resize: none; max-height: 100px; min-height: 22px;
  overflow-y: auto;
}
#msg-input::placeholder { color: var(--text-dim); }
#msg-input::-webkit-scrollbar { width: 2px; }
#msg-input::-webkit-scrollbar-thumb { background: var(--border); }

.emoji-btn {
  background: none; border: none; cursor: pointer;
  font-size: 18px; padding: 0; line-height: 1;
  flex-shrink: 0; opacity: 0.55; transition: opacity 0.15s;
}
.emoji-btn:hover { opacity: 1; }

.send-btn {
  width: 44px; height: 44px; border-radius: 50%;
  background: var(--accent); border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: background 0.15s, transform 0.1s;
  box-shadow: 0 2px 12px rgba(46,168,79,0.3);
}
.send-btn:hover  { background: #3bc95e; }
.send-btn:active { transform: scale(0.92); }
.send-btn:disabled { background: var(--border); box-shadow: none; cursor: not-allowed; }
.send-btn svg { width: 20px; height: 20px; fill: #fff; }

/* TX progress */
.tx-progress { height: 2px; background: var(--border); flex-shrink: 0; overflow: hidden; }
#tx-bar {
  height: 100%; width: 0%;
  background: linear-gradient(90deg, var(--accent), #5bdb7a);
  transition: width 0.08s linear;
}

@media (min-width: 480px) {
  .app { box-shadow: 0 0 60px rgba(0,0,0,0.5); }
}
</style>
</head>
<body>

<div class="app">

  <!-- Header -->
  <div class="header">
    <div class="avatar">B</div>
    <div class="header-info">
      <div class="header-name">Device B</div>
      <div class="header-sub">
        <span class="freq-badge">FSK 1200 / 2200 Hz</span>
        <span>listening…</span>
      </div>
    </div>
    <button class="icon-btn" id="btn-info" title="Protocol info">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
    </button>
  </div>

  <!-- Waveform strip -->
  <div class="wave-strip">
    <span class="wave-label">Signal</span>
    <canvas id="wave-canvas"></canvas>
  </div>

  <!-- Chat body -->
  <div class="chat-body" id="chat-body">
    <div class="date-divider"><span>Today</span></div>
    <div class="sys-msg">🔊 DSP Chat · Sound-based messaging</div>
    <div class="sys-msg">Text → Binary → FSK Tones → Speaker</div>
  </div>

  <!-- Input bar -->
  <div class="input-bar">
    <div class="input-wrap">
      <button class="emoji-btn">😊</button>
      <textarea id="msg-input" placeholder="Message" rows="1"></textarea>
    </div>
    <button class="send-btn" id="btn-send">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>

  <!-- Progress -->
  <div class="tx-progress"><div id="tx-bar"></div></div>

</div>

<script>
// ─── FSK Constants ───────────────────────────────────────────
const FREQ0    = 1200;   // Hz — bit 0 (SPACE)
const FREQ1    = 2200;   // Hz — bit 1 (MARK)
const BIT_DUR  = 0.08;   // seconds per bit → 12.5 bps
const VOLUME   = 0.72;

// 8 alternating preamble bits so Device B can sync before data starts
const PREAMBLE = [1,0,1,0,1,0,1,0];

// ─── Audio ───────────────────────────────────────────────────
let audioCtx     = null;
let analyserNode = null;
let isTransmitting = false;

function ctx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

// ─── Text → bits (ASCII 8-bit MSB first) ─────────────────────
function textToBits(text) {
  const bits = [];
  for (const ch of text) {
    const code = ch.charCodeAt(0);
    for (let i = 7; i >= 0; i--) bits.push((code >> i) & 1);
  }
  return bits;
}

function textToBinStr(text) {
  return Array.from(text)
    .map(ch => ch.charCodeAt(0).toString(2).padStart(8,'0'))
    .join(' ');
}

// ─── FSK transmit ─────────────────────────────────────────────
function transmit(text, onProgress, onDone) {
  if (isTransmitting) return;
  isTransmitting = true;

  const ac   = ctx();
  const gain = ac.createGain();
  gain.gain.value = VOLUME;

  analyserNode = ac.createAnalyser();
  analyserNode.fftSize = 512;
  gain.connect(analyserNode);
  analyserNode.connect(ac.destination);

  const dataBits = textToBits(text);
  const allBits  = [...PREAMBLE, ...dataBits];
  const total    = allBits.length;

  let t = ac.currentTime + 0.05;

  allBits.forEach((bit, i) => {
    const freq = bit === 0 ? FREQ0 : FREQ1;
    const osc  = ac.createOscillator();
    const env  = ac.createGain();

    osc.type = 'sine';
    osc.frequency.value = freq;

    // Smooth envelope: ramp up/down 4ms to avoid clicks
    env.gain.setValueAtTime(0, t);
    env.gain.linearRampToValueAtTime(1, t + 0.004);
    env.gain.setValueAtTime(1, t + BIT_DUR - 0.004);
    env.gain.linearRampToValueAtTime(0, t + BIT_DUR);

    osc.connect(env);
    env.connect(gain);
    osc.start(t);
    osc.stop(t + BIT_DUR);

    osc.onended = () => onProgress(Math.round(((i + 1) / total) * 100), i + 1, total);

    t += BIT_DUR;
  });

  // Finish after all bits + small tail
  const totalMs = (total * BIT_DUR + 0.25) * 1000;
  setTimeout(() => {
    analyserNode = null;
    isTransmitting = false;
    onDone();
  }, totalMs);
}

// ─── Waveform canvas ──────────────────────────────────────────
const waveCanvas = document.getElementById('wave-canvas');
const wc         = waveCanvas.getContext('2d');

function resizeWave() {
  waveCanvas.width  = waveCanvas.offsetWidth  * devicePixelRatio;
  waveCanvas.height = waveCanvas.offsetHeight * devicePixelRatio;
}
resizeWave();
window.addEventListener('resize', resizeWave);

function drawWave() {
  requestAnimationFrame(drawWave);
  const W = waveCanvas.width, H = waveCanvas.height;
  wc.clearRect(0, 0, W, H);

  if (!analyserNode) {
    // Idle flat line
    wc.strokeStyle = 'rgba(46,168,79,0.2)';
    wc.lineWidth = 1.5;
    wc.beginPath();
    wc.moveTo(0, H / 2); wc.lineTo(W, H / 2);
    wc.stroke();
    return;
  }

  const buf = new Uint8Array(analyserNode.frequencyBinCount);
  analyserNode.getByteTimeDomainData(buf);

  wc.strokeStyle = '#2ea84f';
  wc.lineWidth = 1.5 * devicePixelRatio;
  wc.shadowColor = '#2ea84f';
  wc.shadowBlur  = 6;
  wc.beginPath();

  const step = W / buf.length;
  for (let i = 0; i < buf.length; i++) {
    const y = (buf[i] / 128.0) * (H / 2);
    i === 0 ? wc.moveTo(0, y) : wc.lineTo(i * step, y);
  }
  wc.stroke();
  wc.shadowBlur = 0;
}
drawWave();

// ─── UI helpers ───────────────────────────────────────────────
const chatBody = document.getElementById('chat-body');
const msgInput = document.getElementById('msg-input');
const btnSend  = document.getElementById('btn-send');
const txBar    = document.getElementById('tx-bar');

function now() {
  return new Date().toLocaleTimeString('en-US', {hour:'numeric', minute:'2-digit'});
}

function scrollDown() { chatBody.scrollTop = chatBody.scrollHeight; }

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Pending (orange border) bubble + binary hint below it
function addPendingBubble(text) {
  const row = document.createElement('div');
  row.className = 'msg-row out sending';
  row.innerHTML = `
    <div class="bubble">
      ${esc(text)}
      <div class="msg-meta">
        <span>${now()}</span>
        <span class="tick">
          <svg viewBox="0 0 16 11" fill="none">
            <path d="M1 5.5L5.5 10L15 1" stroke="#f0883e" stroke-width="1.8"
              stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </span>
      </div>
    </div>
    <div class="binary-hint">${textToBinStr(text)}</div>`;
  chatBody.appendChild(row);
  scrollDown();
  return row;
}

// Animated sending indicator
function addIndicator(totalBits) {
  const el = document.createElement('div');
  el.className = 'msg-row out';
  el.innerHTML = `
    <div class="sending-indicator">
      <div class="tone-bars">
        <div class="tone-bar"></div><div class="tone-bar"></div>
        <div class="tone-bar"></div><div class="tone-bar"></div>
        <div class="tone-bar"></div>
      </div>
      <span class="sending-text">transmitting…</span>
      <span class="bit-counter" id="bctr">0 / ${totalBits} bits</span>
    </div>`;
  chatBody.appendChild(el);
  scrollDown();
  return el;
}

// Mark bubble as delivered (green, double tick)
function markDelivered(row) {
  row.classList.remove('sending');
  row.querySelector('.tick').innerHTML = `
    <svg viewBox="0 0 22 11" fill="none">
      <path d="M1 5.5L5.5 10L15 1" stroke="rgba(255,255,255,0.55)"
        stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M7 5.5L11.5 10L21 1" stroke="rgba(255,255,255,0.55)"
        stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>`;
  const hint = row.querySelector('.binary-hint');
  if (hint) hint.classList.add('visible');
}

// ─── Send ─────────────────────────────────────────────────────
function send() {
  const text = msgInput.value.trim();
  if (!text || isTransmitting) return;

  msgInput.value = '';
  msgInput.style.height = '';
  btnSend.disabled = true;

  const dataBits  = textToBits(text);
  const totalBits = PREAMBLE.length + dataBits.length;

  const bubble    = addPendingBubble(text);
  const indicator = addIndicator(totalBits);

  transmit(
    text,
    (pct, done, total) => {
      txBar.style.width = pct + '%';
      const el = document.getElementById('bctr');
      if (el) el.textContent = `${done} / ${total} bits`;
    },
    () => {
      txBar.style.width = '100%';
      setTimeout(() => txBar.style.width = '0%', 700);
      indicator.remove();
      markDelivered(bubble);
      btnSend.disabled = false;
      msgInput.focus();
    }
  );
}

// ─── Events ───────────────────────────────────────────────────
msgInput.addEventListener('input', function () {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 100) + 'px';
});

msgInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});

btnSend.addEventListener('click', send);

// Info bubble
document.getElementById('btn-info').addEventListener('click', () => {
  const row = document.createElement('div');
  row.className = 'msg-row in';
  row.innerHTML = `
    <div class="bubble" style="font-size:12.5px;line-height:1.8;font-family:var(--mono)">
      <b style="font-family:var(--font);font-size:13.5px;display:block;margin-bottom:4px">FSK Protocol</b>
      Bit 0 → 1200 Hz (SPACE)<br>
      Bit 1 → 2200 Hz (MARK)<br>
      Bit duration → 80 ms<br>
      Speed → ~12.5 bps<br>
      Encoding → ASCII 8-bit<br>
      Preamble → 8 sync bits
      <div class="msg-meta" style="color:var(--text-muted);margin-top:6px">
        <span>${now()}</span>
      </div>
    </div>`;
  chatBody.appendChild(row);
  scrollDown();
});
</script>
</body>
</html>
